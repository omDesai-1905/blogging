<div class="blog-create-container">
  <div class="blog-create-card">
    <h2>Create New Blog Post</h2>

    <form [formGroup]="blogForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Title *</label>
        <input
          type="text"
          id="title"
          formControlName="title"
          placeholder="Enter blog title"
          class="form-control"
          (blur)="generateSlug()"
        />
        <div
          class="error-text"
          *ngIf="
            blogForm.get('title')?.invalid && blogForm.get('title')?.touched
          "
        >
          Title is required
        </div>
      </div>

      <div class="form-group">
        <label for="slug">Slug *</label>
        <input
          type="text"
          id="slug"
          formControlName="slug"
          placeholder="url-friendly-slug"
          class="form-control"
        />
        <small>Auto-generated from title. You can edit it if needed.</small>
        <div
          class="error-text"
          *ngIf="blogForm.get('slug')?.invalid && blogForm.get('slug')?.touched"
        >
          Slug is required
        </div>
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <input
          type="text"
          id="category"
          formControlName="category"
          placeholder="e.g., Technology, Lifestyle, Travel"
          class="form-control"
        />
        <div
          class="error-text"
          *ngIf="
            blogForm.get('category')?.invalid &&
            blogForm.get('category')?.touched
          "
        >
          Category is required
        </div>
      </div>

      <div class="form-group">
        <label for="image">Featured Image *</label>
        <input
          type="file"
          id="image"
          accept="image/*"
          (change)="onFileSelected($event)"
          class="form-control"
        />
        <div class="image-preview" *ngIf="imagePreview">
          <img [src]="imagePreview" alt="Preview" />
        </div>
      </div>

      <div class="form-group">
        <label for="content">Content *</label>
        <textarea
          id="content"
          formControlName="content"
          placeholder="Write your blog content here..."
          rows="12"
          class="form-control"
        ></textarea>
        <div
          class="error-text"
          *ngIf="
            blogForm.get('content')?.invalid && blogForm.get('content')?.touched
          "
        >
          Content is required
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          {{ isLoading ? "Creating..." : "Create Blog Post" }}
        </button>
        <a routerLink="/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
